
    <html>
    <head><meta charset="UTF-8"><style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }

    <body>
        <h2>📊 V3 策略分析 (ALL) - 20260418</h2>

            <tbody id="tb"></tbody>
        </table>
        <script>

                <tr class="${i.pnl >= 30 ? 'hero' : ''}">
