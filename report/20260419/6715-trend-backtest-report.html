
    <!DOCTYPE html><html><head><meta charset='utf-8'><title>all 趨勢報告</title>
    <style>
        body { font-family: 'Segoe UI', "PingFang TC", sans-serif; padding: 40px; background: #f1f5f9; font-size: 1.5rem; }
        .container { max-width: 1600px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .filter-group { display: flex; gap: 20px; margin-bottom: 20px; background: #1e293b; padding: 20px; border-radius: 12px; color: white; align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 8px; }
        select, input { padding: 12px; border-radius: 8px; border: none; font-size: 1.4rem; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #2563eb; color: white; padding: 18px; cursor: pointer; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .sig-buy { color: #dc2626; font-weight: bold; background: #fef2f2; padding: 4px 8px; border-radius: 4px; }
        .hero { background: #fffde7 !important; font-weight: bold; }
        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); }
        .modal-content { background:#fff; margin:5% auto; padding:25px; width:70%; max-height:80%; border-radius:12px; overflow-y:auto; }
        #logContent { background:#0f172a; color:#94a3b8; padding:20px; border-radius:8px; white-space:pre-wrap; font-family:monospace; line-height:1.6; }
        .close { float:right; font-size:28px; cursor:pointer; }
    </style>
    </head>
    <body><div class='container'>
        <h2>📈 ALL 趨勢回測分析報告</h2>
        <div class="filter-group">
            <div class="filter-item"><label>🔍 搜尋</label><input type="text" id="searchInput" onkeyup="filter()"></div>
            <div class="filter-item"><label>📊 獲利門檻</label>
                <select id="pFilter" onchange="filter()">
                    <option value="-999">全部</option><option value="20">20%</option><option value="50">50%</option>
                    <option value="70">70%</option><option value="90">90%</option><option value="100">100%</option>
                </select>
            </div>
            <div class="filter-item"><label>🔥 訊號</label>
                <select id="sFilter" onchange="filter()">
                    <option value="all">不限</option><option value="買入">🔥 買入</option><option value="持股">💎 持股</option><option value="賣出">❄️ 賣出</option>
                </select>
            </div>
        </div>
        <div class='card'><table id='stockTable'>
            <thead><tr><th>代號</th><th>名稱</th><th>現價</th><th>訊號</th><th>累積獲利</th><th>次數</th><th>勝率</th><th>理由</th></tr></thead>
            <tbody><tr class='hero'><td><a style='text-decoration:none; color:#2563eb; font-weight:bold;' target='_blank' href='https://tw.stock.yahoo.com/quote/6715.TW/technical-analysis'>6715.TW</a></td><td><a href='javascript:void(0)' onclick='showLog("6715.TW")' style='text-decoration:none; color:#1e293b; border-bottom:1px dashed #94a3b8;'>嘉基</a></td><td>426.00</td><td><span class=''>💎 持股</span></td><td style='color:#059669'>231.36%</td><td>1</td><td>100.0%</td><td>趨勢維持</td></tr></tbody>
        </table></div>
    </div>
    <div id="logModal" class="modal"><div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="logTitle"></h3><pre id="logContent"></pre>
    </div></div>
    <script>
    function filter() {
        let s = document.getElementById("searchInput").value.toUpperCase();
        let p = parseFloat(document.getElementById("pFilter").value);
        let sig = document.getElementById("sFilter").value;
        let rows = Array.from(document.getElementById("stockTable").tBodies[0].rows);
        rows.forEach(r => {
            let mText = r.cells[0].innerText.includes(s) || r.cells[1].innerText.includes(s);
            let mPnl = parseFloat(r.cells[4].innerText.replace('%','')) >= p;
            let mSig = (sig === "all") || r.cells[3].innerText.includes(sig);
            r.style.display = (mText && mPnl && mSig) ? "" : "none";
        });
    }
    async function showLog(id) {
        const modal = document.getElementById("logModal");
        const content = document.getElementById("logContent");
        document.getElementById("logTitle").innerText = "📄 回測詳情: " + id;
        modal.style.display = "block";
        content.innerText = "讀取中...";
        
        const paths = [`${id}-trend-backtest-report.txt`, `${id.split('.')[0]}-trend-backtest-report.txt`];
        let found = false;
        for (let p of paths) {
            try {
                let res = await fetch(p);
                if (res.ok) {
                    content.innerText = await res.text();
                    found = true; break;
                }
            } catch(e) {}
        }
        if (!found) content.innerHTML = `<p style='color:#f87171'>⚠️ 找不到 TXT 日誌檔</p>請在終端機執行:<br><code>python3 trend-backtest-analyzer17.py -s ${id.split('.')[0]}</code>`;
    }
    function closeModal() { document.getElementById("logModal").style.display = "none"; }
    </script></body></html>
