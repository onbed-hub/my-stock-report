<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>實時監控入口 - 全自動掃描版</title>
    <style>
        /* 延用你喜歡的樣式 */
        body { font-family: sans-serif; background-color: #f8fafc; padding: 2rem; }
        .container { background: white; padding: 2rem; border-radius: 20px; max-width: 700px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .section-header { font-weight: 800; color: #64748b; margin: 2rem 0 1rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; text-transform: uppercase; }
        .report-grid { display: grid; gap: 10px; }
        .card { display: flex; align-items: center; text-decoration: none; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 12px; transition: 0.2s; }
        .card:hover { border-color: #6366f1; background: #f8fafc; transform: translateX(5px); }
        .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; margin-right: 12px; color: white; font-weight: bold; }
        .title { color: #334155; font-weight: 600; flex-grow: 1; }
        .time-tag { font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="text-decoration:none; color:#6366f1;">← 返回主頁</a>
    <h1>🛰️ 實時監控自動偵測</h1>
    <input type="date" id="datePicker" onchange="loadDynamicReports()" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
    
    <div id="reportArea"></div>
</div>

<script>
    // 定義類型對應的標籤顏色
    const typeMap = {
        'ma': { label: '均線', color: '#7c3aed' },
        'rsi': { label: '強弱', color: '#10b981' },
        'fvg': { label: '缺口', color: '#f59e0b' },
        'consolidation': { label: '盤整', color: '#6366f1' }
    };

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('datePicker').value = urlParams.get('date') || new Date().toISOString().split('T')[0];
        loadDynamicReports();
    };

    async function loadDynamicReports() {
        const dateDir = document.getElementById('datePicker').value.replace(/-/g, '');
        const area = document.getElementById('reportArea');
        area.innerHTML = '偵測中...';

        try {
            // 讀取當天目錄下的 files.json (由你的腳本產生)
            const response = await fetch(`report/${dateDir}/files.json`);
            if (!response.ok) throw new Error();
            
            const text = await response.text();
            const files = text.split('\n').filter(f => f.trim() !== '' && f.includes('-live-'));
            
            // 根據前綴分組
            const groups = {};
            files.forEach(file => {
                const prefix = file.split('-')[0]; // 抓出 bor, siesin, 2485
                if (!groups[prefix]) groups[prefix] = [];
                groups[prefix].push(file);
            });

            area.innerHTML = '';
            Object.keys(groups).sort().forEach(prefix => {
                const section = document.createElement('div');
                section.innerHTML = `<div class="section-header">${prefix.toUpperCase()} 系列</div>`;
                const grid = document.createElement('div');
                grid.className = 'report-grid';

                groups[prefix].forEach(file => {
                    // 辨識類型
                    let typeKey = Object.keys(typeMap).find(k => file.toLowerCase().includes(k)) || 'live';
                    const config = typeMap[typeKey] || { label: 'LIVE', color: '#94a3b8' };
                    
                    const card = document.createElement('a');
                    card.href = `report/${dateDir}/${file}`;
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="badge" style="background:${config.color}">${config.label}</span>
                        <span class="title">${file}</span>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                area.appendChild(section);
            });

        } catch (e) {
            area.innerHTML = '<div style="padding:2rem; text-align:center; color:#94a3b8;">📅 尚未產生 files.json 或當天無 live 報表</div>';
        }
    }
</script>
</body>
</html>
