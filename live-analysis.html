<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時監控入口 - 量化儀表板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; justify-content: center; padding: 2rem 1.5rem; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 680px; }
        .back-link { text-decoration: none; color: #6366f1; font-weight: bold; font-size: 0.9rem; display: inline-block; margin-bottom: 1rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #1e293b; text-align: center; }
        .controls { margin-bottom: 2rem; }
        .control-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 12px 15px; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        .section-header { font-size: 1rem; color: #64748b; margin: 1.8rem 0 0.8rem 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin-left: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card { display: flex; flex-direction: column; text-decoration: none; padding: 1rem 1.25rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; transition: all 0.2s; position: relative; }
        .card:hover { border-color: #6366f1; transform: translateX(8px); background: #f8fafc; }
        .title { font-weight: 600; color: #334155; }
        .status-badge { font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .status-ok { color: #10b981; background: #ecfdf5; }
        .status-missing { color: #ef4444; background: #fef2f2; }
        .card.missing { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; margin-bottom: 6px; width: fit-content; font-weight: bold; background: #ede9fe; color: #7c3aed; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← 返回主儀表板</a>
    <h1>🛰️ 實時監控分析入口</h1>

    <div class="controls">
        <div class="control-group">
            <label>📅 同步日期</label>
            <input type="date" id="datePicker" onchange="updateReportPaths()">
        </div>
    </div>

    <div class="report-section">
        <div class="section-header">Live Analysis Variants</div>
        <div class="report-grid">
            <a href="#" class="card" data-base="bor-ma-live-analysis.html">
                <span class="badge">MA LIVE</span>
                <span class="title">MA 均線實時分析 <span class="status-badge"></span></span>
            </a>
            <a href="#" class="card" data-base="bor-rsi-live-analysis.html">
                <span class="badge">RSI LIVE</span>
                <span class="title">RSI 強弱實時分析 <span class="status-badge"></span></span>
            </a>
            <a href="#" class="card" data-base="bor-fvg-live-analysis.html">
                <span class="badge">FVG LIVE</span>
                <span class="title">FVG 缺口實時分析 <span class="status-badge"></span></span>
            </a>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        let dateVal = urlParams.get('date');
        
        // 確保一定有日期，沒抓到就給今天
        if (!dateVal || dateVal === "undefined") {
            dateVal = new Date().toISOString().split('T')[0];
        }

        document.getElementById('datePicker').value = dateVal;
        updateReportPaths();
    };

    async function updateReportPaths() {
        const dateInput = document.getElementById('datePicker').value;
        if (!dateInput) return;

        const dateDir = dateInput.replace(/-/g, '');
        const cards = document.querySelectorAll('.card[data-base]'); // 只抓有 data-base 的

        for (const card of cards) {
            const fileName = card.getAttribute('data-base');
            const newHref = `report/${dateDir}/${fileName}`;
            const statusBadge = card.querySelector('.status-badge');
            
            card.setAttribute('href', newHref);

            try {
                // 機制回歸：發送 HEAD 請求檢查檔案是否真的在伺服器上
                const response = await fetch(newHref, { method: 'HEAD' });
                if (response.ok) {
                    statusBadge.textContent = "✅ 已就緒";
                    statusBadge.className = "status-badge status-ok";
                    card.classList.remove('missing');
                } else {
                    statusBadge.textContent = "⚠️ 無資料";
                    statusBadge.className = "status-badge status-missing";
                    card.classList.add('missing');
                }
            } catch (error) {
                statusBadge.textContent = "⚠️ 檢查失敗";
                card.classList.add('missing');
            }
        }
    }
</script>
</body>
</html>
