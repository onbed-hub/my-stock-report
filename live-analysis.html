<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時監控入口 - 量化儀表板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; justify-content: center; padding: 2rem 1.5rem; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 680px; }
        .back-link { text-decoration: none; color: #6366f1; font-weight: bold; font-size: 0.9rem; display: inline-block; margin-bottom: 1rem; transition: color 0.2s; }
        .back-link:hover { color: #4338ca; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #1e293b; text-align: center; }
        .controls { margin-bottom: 2rem; }
        .control-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 12px 15px; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: #6366f1; }
        .section-header { font-size: 1rem; color: #64748b; margin: 1.8rem 0 0.8rem 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin-left: 15px; }
        .report-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { display: flex; flex-direction: column; text-decoration: none; padding: 1.2rem 1.5rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s ease-out; position: relative; }
        .card:hover { border-color: #6366f1; transform: translateX(8px); background: #f8fafc; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1); }
        .title { font-weight: 600; color: #334155; font-size: 1.05rem; }
        .status-badge { font-size: 0.7rem; font-weight: bold; padding: 2px 8px; border-radius: 6px; margin-left: 10px; vertical-align: middle; }
        .status-ok { color: #10b981; background: #ecfdf5; }
        .status-missing { color: #ef4444; background: #fef2f2; }
        .card.missing { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; margin-bottom: 8px; width: fit-content; font-weight: bold; background: #ede9fe; color: #7c3aed; text-transform: uppercase; }
        .file-path { font-size: 0.75rem; color: #94a3b8; font-family: monospace; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← 返回主儀表板</a>
    <h1>🛰️ 實時監控分析入口</h1>

    <div class="controls">
        <div class="control-group">
            <label>📅 報告日期 (自動同步主頁選擇)</label>
            <input type="date" id="datePicker" onchange="updateReportPaths()">
        </div>
    </div>

    <div class="report-section">
        <div class="section-header">Live Analysis Variants</div>
        <div class="report-grid">
            
            <a href="#" class="card" data-base="bor-ma-live-analysis.html">
                <span class="badge">MA LIVE</span>
                <span class="title">MA 均線實時分析 <span class="status-badge">檢查中...</span></span>
                <div class="file-path">📄 bor-ma-live-analysis.html</div>
            </a>

            <a href="#" class="card" data-base="bor-rsi-live-analysis.html">
                <span class="badge">RSI LIVE</span>
                <span class="title">RSI 強弱實時分析 <span class="status-badge">檢查中...</span></span>
                <div class="file-path">📄 bor-rsi-live-analysis.html</div>
            </a>

            <a href="#" class="card" data-base="bor-fvg-live-analysis.html">
                <span class="badge">FVG LIVE</span>
                <span class="title">FVG 缺口實時分析 <span class="status-badge">檢查中...</span></span>
                <div class="file-path">📄 bor-fvg-live-analysis.html</div>
            </a>

            <a href="#" class="card" data-base="trend-live-analysis.html">
                <span class="badge">TREND</span>
                <span class="title">趨勢實時監控 <span class="status-badge">檢查中...</span></span>
                <div class="file-path">📄 trend-live-analysis.html</div>
            </a>

        </div>
    </div>
</div>

<script>
    window.onload = function() {
        // 1. 優先從 URL 參數抓日期 (?date=2026-04-10)
        const urlParams = new URLSearchParams(window.location.search);
        let dateVal = urlParams.get('date');
        
        // 2. 如果 URL 沒日期，嘗試從 localStorage 抓 (主頁存的)，最後才用今天
        if (!dateVal) {
            dateVal = new Date().toISOString().split('T')[0];
        }

        const datePicker = document.getElementById('datePicker');
        datePicker.value = dateVal;

        // 3. 初始化路徑檢查
        updateReportPaths();
    };

    async function updateReportPaths() {
        const dateInput = document.getElementById('datePicker').value;
        if (!dateInput) return;

        const dateDir = dateInput.replace(/-/g, '');
        const cards = document.querySelectorAll('.card');

        for (const card of cards) {
            const fileName = card.getAttribute('data-base');
            
            // 重要防呆：如果沒有 data-base 屬性就跳過，避免出現 /null 路徑
            if (!fileName || fileName === "null") continue; 

            const newHref = `report/${dateDir}/${fileName}`;
            const statusBadge = card.querySelector('.status-badge');
            
            // 先設定 href，即使 404 也會顯示，方便觀察路徑
            card.setAttribute('href', newHref);

            try {
                // 發送 HEAD 請求檢查檔案是否存在
                const response = await fetch(newHref, { method: 'HEAD' });
                if (response.ok) {
                    statusBadge.textContent = "✅ 已就緒";
                    statusBadge.className = "status-badge status-ok";
                    card.classList.remove('missing');
                } else {
                    statusBadge.textContent = "⚠️ 無資料";
                    statusBadge.className = "status-badge status-missing";
                    card.classList.add('missing');
                }
            } catch (error) {
                statusBadge.textContent = "⚠️ 檢查失敗";
                card.classList.add('missing');
            }
        }
    }
</script>
</body>
</html>
